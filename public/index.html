<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TiGrIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, "Segoe UI", Roboto, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .logo { max-width: 320px; width: 100%; filter: brightness(0) invert(1); display: block; margin: 0 auto 1.5rem; }
    .lead { font-size: 1.15rem; opacity: 0.7; margin-bottom: 2rem; }
    .soon { font-size: 0.9rem; opacity: 0.4; }
  </style>
</head>
<body>
  <div>
    <img src="tigris-logo.svg" alt="TiGrIS" class="logo">
    <p class="lead">An edge ML toolchain that tiles and compiles your model to run on (almost) any device.</p>
    <p class="soon">Coming soon.</p>
  </div>
</body>
</html>
