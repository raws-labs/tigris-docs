<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>TiGrIS — Coming Soon</title>
  <meta name="description" content="Something is tiling into place.">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #06090c;
      --tile: #0e1419;
      --tile-glow: #1a2e24;
      --accent: #32be78;
      --accent-dim: #1a6b42;
      --text: #c9d1d9;
      --text-dim: rgba(201, 209, 217, 0.35);
      --gap: 3px;
    }

    body {
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Grid — fills viewport exactly ── */
    .tile-grid {
      position: fixed;
      inset: 0;
      display: grid;
      gap: var(--gap);
      z-index: 0;
    }

    /* ── Regular tiles ── */
    .tile {
      background: var(--tile);
      border-radius: 1px;
      transition: background 1.5s ease, box-shadow 1.5s ease;
    }

    .tile:hover {
      background: var(--tile-glow);
      box-shadow: inset 0 0 12px rgba(50, 190, 120, 0.08);
      transition: background 0.1s ease, box-shadow 0.1s ease;
    }

    .tile.lit {
      background: #131c18;
      box-shadow: inset 0 0 12px rgba(50, 190, 120, 0.04);
    }

    .tile.bright {
      background: var(--tile-glow);
      box-shadow: inset 0 0 16px rgba(50, 190, 120, 0.06);
    }

    /* ── Logo tiles — grid cells that span multiple rows/cols ── */
    .logo-tile {
      background: var(--tile);
      border-radius: 2px;
      border: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12%;
      transition: background 1.5s ease, box-shadow 1.5s ease, border-color 0.8s ease;
    }

    .logo-tile svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .logo-tile svg path {
      fill: var(--accent);
      opacity: 0;
      transition: opacity 0.8s ease;
    }

    /* Revealed state (after wave passes) */
    .logo-tile.revealed {
      border-color: rgba(50, 190, 120, 0.18);
    }

    .logo-tile.revealed svg path {
      opacity: 0.85;
    }

    @keyframes logoBreathe {
      0%, 100% { border-color: rgba(50, 190, 120, 0.18); }
      50% { border-color: rgba(50, 190, 120, 0.3); }
    }
    .logo-tile.revealed { animation: logoBreathe 5s ease-in-out infinite; }

    /* Wave / flicker states on logo tiles */
    .logo-tile.lit {
      background: var(--tile-glow);
      box-shadow: inset 0 0 24px rgba(50, 190, 120, 0.1);
    }

    .logo-tile.bright {
      background: var(--accent-dim);
      box-shadow: inset 0 0 30px rgba(50, 190, 120, 0.2), 0 0 16px rgba(50, 190, 120, 0.08);
    }

    .logo-tile.bright svg path { opacity: 1; }

    .logo-tile:hover {
      background: #122a1e;
      border-color: var(--accent) !important;
      box-shadow: inset 0 0 30px rgba(50, 190, 120, 0.15), 0 0 20px rgba(50, 190, 120, 0.1);
      transition: background 0.15s ease, box-shadow 0.15s ease, border-color 0.15s ease;
    }

    .logo-tile:hover svg path {
      opacity: 1;
      fill: #5ad99a;
      transition: opacity 0.15s ease, fill 0.15s ease;
    }

    /* Tooltip on logo tile hover */
    .logo-tile {
      position: relative;
    }

    .logo-tile::after {
      content: attr(data-label);
      position: absolute;
      bottom: -28px;
      left: 50%;
      transform: translateX(-50%) translateY(4px);
      font-family: "SF Mono", "Fira Code", "Cascadia Code", monospace;
      font-size: 0.65rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .logo-tile:hover::after {
      opacity: 0.8;
      transform: translateX(-50%) translateY(0);
    }

    /* ── Mouse-follow radial glow ── */
    .tile-grid::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(
        ellipse 600px 600px at var(--rx, 50%) var(--ry, 50%),
        rgba(50, 190, 120, 0.04) 0%,
        transparent 70%
      );
      pointer-events: none;
    }

    /* ── Content overlay ── */
    .content {
      position: fixed;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      align-items: center;
      padding-bottom: 10vh;
      text-align: center;
      pointer-events: none;
    }
    .content > * { pointer-events: auto; }

    .mystery {
      font-size: 0.85rem;
      color: var(--text);
      max-width: 380px;
      line-height: 1.7;
      font-weight: 300;
      opacity: 0;
    }

    .mystery span {
      color: var(--accent);
      font-weight: 500;
    }

    .divider {
      width: 48px;
      height: 1px;
      background: var(--accent-dim);
      margin: 2rem auto;
      opacity: 0;
    }

    .cta {
      display: inline-block;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      text-decoration: none;
      padding: 0.6rem 1.6rem;
      border: 1px solid var(--accent-dim);
      border-radius: 2px;
      opacity: 0;
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    .cta:hover {
      border-color: var(--accent);
      box-shadow: 0 0 20px rgba(50, 190, 120, 0.15);
    }

    @keyframes fadeup {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .text-visible .mystery { animation: fadeup 1s ease forwards; }
    .text-visible .divider { animation: fadeup 1s ease 0.3s forwards; }
    .text-visible .cta     { animation: fadeup 1s ease 0.6s forwards; }

    /* ── Corner markers ── */
    .corner {
      position: fixed;
      width: 20px;
      height: 20px;
      z-index: 3;
      opacity: 0.15;
    }
    .corner::before, .corner::after {
      content: "";
      position: absolute;
      background: var(--accent);
    }
    .corner-tl { top: 16px; left: 16px; }
    .corner-tl::before { top: 0; left: 0; width: 20px; height: 1px; }
    .corner-tl::after  { top: 0; left: 0; width: 1px; height: 20px; }
    .corner-tr { top: 16px; right: 16px; }
    .corner-tr::before { top: 0; right: 0; width: 20px; height: 1px; }
    .corner-tr::after  { top: 0; right: 0; width: 1px; height: 20px; }
    .corner-bl { bottom: 16px; left: 16px; }
    .corner-bl::before { bottom: 0; left: 0; width: 20px; height: 1px; }
    .corner-bl::after  { bottom: 0; left: 0; width: 1px; height: 20px; }
    .corner-br { bottom: 16px; right: 16px; }
    .corner-br::before { bottom: 0; right: 0; width: 20px; height: 1px; }
    .corner-br::after  { bottom: 0; right: 0; width: 1px; height: 20px; }
  </style>
</head>
<body>

  <div class="tile-grid" id="grid"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content" id="content">
    <p class="mystery">Run your ML model where <span>nothing else fits.</span></p>
    <div class="divider"></div>
    <a href="mailto:signup@tigris-ml.dev?subject=TiGrIS%20Early%20Access&amp;body=Hi%2C%20I'd%20like%20early%20access%20to%20TiGrIS.%0A%0ATarget%20device%3A%20%0AUse%20case%3A%20" class="cta">Sign up for early access</a>
  </div>

  <script>
    /* ── SVG content for each logo tile (paths only, viewBox cropped to tile bounds) ── */
    const LOGO_TILES = [
      { // Ti — 2×2
        spanC: 2, spanR: 2, label: 'Tiled',
        viewBox: '10 14 90 92',
        paths: [
          'M365 590V0H235V590H25V698H575V590Z|matrix(0.042,0,0,-0.042,29.80,74.0)',
          'M332 596Q287 596 268.5 615.0Q250 634 250 661V685Q250 712 268.5 731.0Q287 750 332 750Q377 750 395.5 731.0Q414 712 414 685V661Q414 634 395.5 615.0Q377 596 332 596ZM98 101H268V415H98V516H396V101H554V0H98Z|matrix(0.042,0,0,-0.042,55.00,74.0)',
        ],
      },
      { // Gr — 2×2
        spanC: 2, spanR: 2, label: 'Graph',
        viewBox: '108 14 90 92',
        paths: [
          'M421 97H413Q404 76 391.0 56.0Q378 36 359.0 21.0Q340 6 314.5 -3.0Q289 -12 256 -12Q150 -12 95.5 81.5Q41 175 41 344Q41 522 105.0 616.0Q169 710 302 710Q354 710 393.5 696.0Q433 682 461.5 657.0Q490 632 508.5 597.5Q527 563 538 523L418 489Q411 511 402.5 532.0Q394 553 380.5 568.5Q367 584 348.0 593.5Q329 603 301 603Q236 603 208.0 551.0Q180 499 180 409V297Q180 252 186.5 214.5Q193 177 208.0 150.0Q223 123 247.0 108.5Q271 94 307 94Q363 94 392.0 127.5Q421 161 421 213V270H294V365H538V0H421Z|matrix(0.042,0,0,-0.042,127.80,74.0)',
          'M75 101H203V415H75V516H331V375H339Q346 402 358.5 427.5Q371 453 390.5 472.5Q410 492 438.0 504.0Q466 516 505 516H561V396H455Q397 396 364.0 362.0Q331 328 331 275V101H510V0H75Z|matrix(0.042,0,0,-0.042,153.00,74.0)',
        ],
      },
      { // I — 1×2
        spanC: 1, spanR: 2, label: 'Inference',
        viewBox: '206 14 60 92',
        paths: [
          'M78 0V98H235V600H78V698H522V600H365V98H522V0Z|matrix(0.042,0,0,-0.042,223.40,74.0)',
        ],
      },
      { // S — 1×2
        spanC: 1, spanR: 2, label: 'Scheduler',
        viewBox: '274 14 60 92',
        paths: [
          'M292 -12Q202 -12 138.5 19.0Q75 50 35 101L114 183Q153 138 198.5 116.5Q244 95 296 95Q356 95 388.0 122.0Q420 149 420 200Q420 242 396.0 263.5Q372 285 315 294L241 306Q144 323 103.0 376.5Q62 430 62 503Q62 603 127.0 656.5Q192 710 307 710Q389 710 448.5 684.0Q508 658 544 613L467 531Q439 564 400.0 583.5Q361 603 308 603Q194 603 194 509Q194 469 218.0 448.0Q242 427 300 417L373 404Q464 387 508.0 337.0Q552 287 552 209Q552 160 535.0 119.5Q518 79 485.0 49.5Q452 20 403.5 4.0Q355 -12 292 -12Z|matrix(0.042,0,0,-0.042,291.40,74.0)',
        ],
      },
    ];

    const LOGO_W = 6; // total columns: 2+2+1+1
    const LOGO_H = 2; // total rows

    const grid = document.getElementById('grid');
    const content = document.getElementById('content');

    // tileMap[row][col] → DOM element (0-indexed)
    let tileMap = [];
    let logoElements = [];
    let cols, rows;

    function buildGrid() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      const target = 60;

      cols = Math.round(w / target);
      rows = Math.round(h / target);
      if (cols < 8) cols = 8;
      if (rows < 6) rows = 6;
      if (cols % 2 !== 0) cols++; // keep even so logo centers exactly

      grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
      grid.style.gridTemplateRows = `repeat(${rows}, 1fr)`;
      grid.innerHTML = '';
      tileMap = [];
      logoElements = [];

      for (let r = 0; r < rows; r++) tileMap[r] = new Array(cols).fill(null);

      // Logo placement: centered, slightly above middle
      const lc = (cols - LOGO_W) / 2;
      const lr = Math.floor((rows - LOGO_H) / 2) - 1;

      // Place logo tiles
      let cx = lc;
      for (const lt of LOGO_TILES) {
        const el = document.createElement('div');
        el.className = 'logo-tile';
        el.dataset.label = lt.label;
        // CSS grid is 1-indexed
        el.style.gridColumn = `${cx + 1} / span ${lt.spanC}`;
        el.style.gridRow = `${lr + 1} / span ${lt.spanR}`;

        // Build inline SVG
        const svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
        svg.setAttribute('viewBox', lt.viewBox);
        svg.setAttribute('preserveAspectRatio', 'xMidYMid meet');
        for (const p of lt.paths) {
          const [d, transform] = p.split('|');
          const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
          path.setAttribute('d', d);
          path.setAttribute('transform', transform);
          svg.appendChild(path);
        }
        el.appendChild(svg);
        grid.appendChild(el);
        logoElements.push(el);

        // Mark occupied cells
        for (let dr = 0; dr < lt.spanR; dr++) {
          for (let dc = 0; dc < lt.spanC; dc++) {
            tileMap[lr + dr][cx + dc] = el;
          }
        }
        cx += lt.spanC;
      }

      // Fill remaining cells with regular tiles
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (tileMap[r][c]) continue;
          const t = document.createElement('div');
          t.className = 'tile';
          t.style.gridColumn = String(c + 1);
          t.style.gridRow = String(r + 1);
          grid.appendChild(t);
          tileMap[r][c] = t;
        }
      }

      // Start reveal
      setTimeout(revealSequence, 300);
    }

    /* ── Reveal wave: sweeps left→right, logo tiles stay revealed ── */
    function revealSequence() {
      const oy = Math.floor(rows / 2);
      const maxDist = cols + rows;
      const seen = new Set(); // dedup for multi-cell logo tiles

      for (let d = 0; d < maxDist; d++) {
        setTimeout(() => {
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (Math.abs(c) + Math.abs(r - oy) !== d) continue;
              const el = tileMap[r][c];
              if (seen.has(el)) continue;
              seen.add(el);

              if (el.classList.contains('logo-tile')) {
                el.classList.add('bright');
                setTimeout(() => {
                  el.classList.remove('bright');
                  el.classList.add('revealed');
                }, 600);
              } else {
                el.classList.add('lit');
                setTimeout(() => el.classList.remove('lit'), 500 + Math.random() * 400);
              }
            }
          }

          if (d === Math.floor(cols * 0.6)) {
            content.classList.add('text-visible');
          }
        }, d * 35);
      }

      // Start ambient animations after reveal
      setTimeout(() => {
        setInterval(wave, 7000);
        setInterval(flicker, 900);
      }, maxDist * 35 + 800);
    }

    /* ── Ambient wave ── */
    function wave() {
      const ox = Math.floor(Math.random() * cols);
      const oy = Math.floor(Math.random() * rows);
      const maxDist = cols + rows;
      const seen = new Set();

      for (let d = 0; d < maxDist; d++) {
        setTimeout(() => {
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if (Math.abs(c - ox) + Math.abs(r - oy) !== d) continue;
              const el = tileMap[r][c];
              if (seen.has(el)) continue;
              seen.add(el);

              const cls = Math.random() > 0.6 ? 'bright' : 'lit';
              el.classList.add(cls);
              setTimeout(() => el.classList.remove('lit', 'bright'),
                1800 + Math.random() * 1200);
            }
          }
        }, d * 50);
      }
    }

    /* ── Ambient flicker ── */
    function flicker() {
      const count = 2 + Math.floor(Math.random() * 4);
      for (let j = 0; j < count; j++) {
        const r = Math.floor(Math.random() * rows);
        const c = Math.floor(Math.random() * cols);
        const el = tileMap[r][c];
        if (el.classList.contains('logo-tile')) continue; // don't flicker logo
        el.classList.add('lit');
        setTimeout(() => el.classList.remove('lit'), 1200 + Math.random() * 2000);
      }
    }

    /* ── Mouse tracking ── */
    document.addEventListener('mousemove', (e) => {
      grid.style.setProperty('--rx', e.clientX + 'px');
      grid.style.setProperty('--ry', e.clientY + 'px');
    });

    buildGrid();
    window.addEventListener('resize', buildGrid);
  </script>

</body>
</html>
